<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Canonical -->
  <link rel="canonical" href="https://megan-oliver-behavioral-marketing.github.io/DecisionMoments/" />

  <!-- Favicon -->
  <link rel="icon" href="Decision Moments Favicon.png" type="image/png" />

  <!-- Stylesheet -->
 <link rel="stylesheet" href="site.css" />

  <title>Decision Moments</title>

  <style>
    /* Temporary inline nav styling until core-framework.css grows */

    :root {
      --ink: #1A1A1A;
      --paper: #FAF9F7;
      --signal-blue: #3A6EA5;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, sans-serif;
    }

    /* NAVIGATION */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #ddd;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    nav img.logo {
      height: 40px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 1.5rem;
      margin: 0;
      padding: 0;
    }

    nav a {
      text-decoration: none;
      color: var(--ink);
      font-weight: 500;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: var(--ink);
      border-radius: 2px;
    }

    /* MOBILE MENU */
    @media (max-width: 768px) {
      nav ul {
        display: none;
        flex-direction: column;
        background: var(--paper);
        position: absolute;
        top: 70px;
        right: 0;
        width: 200px;
        padding: 1rem;
        border-left: 1px solid #ddd;
        border-bottom: 1px solid #ddd;
      }

      nav ul.open {
        display: flex;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>

  <script>
    function toggleMenu() {
      const menu = document.getElementById("nav-menu");
      menu.classList.toggle("open");
    }
  </script>
</head>

<body>

  <!-- NAVIGATION BAR -->
  <nav>
    <img src="Decision Moments Logo.png" alt="Decision Moments logo" class="logo" />

    <div class="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <ul id="nav-menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="articles.html">Articles</a></li>
      <li><a href="topics.html">Topics</a></li>
      <li><a href="guides.html">Guides</a></li>
      <li><a href="glossary.html">Glossary</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- TEMPORARY HOMEPAGE CONTENT -->
  <main style="padding: 2rem;">
    <h1>Decision Moments</h1>
    <p>A publication exploring behavioral marketing and decision architecture.</p>
  </main>

</body>
</html>
